<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Shield</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* 🌌 BACKGROUND */
body {
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e3a8a, #0ea5e9);
    background-size: 200% 200%;
    animation: bgMove 8s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🔄 BACKGROUND ANIMATION */
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🔥 LOADING SCREEN */
#loading {
    position: absolute;
    text-align: center;
    color: #22d3ee;
}

#loading h1 {
    font-size: 28px;
    text-shadow: 0 0 20px rgba(34, 211, 238, 0.7);
}

.loader {
    margin: 20px auto;
    width: 45px;
    height: 45px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid #22d3ee;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* 🧊 LOGIN CARD */
.card {
    display: none;
    width: 320px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(20px);

    border: 1px solid rgba(34, 211, 238, 0.3);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.5),
        0 0 20px rgba(34, 211, 238, 0.2);

    text-align: center;

    animation: floatCard 4s ease-in-out infinite;
}

@keyframes floatCard {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
}

/* TITLE */
h2 {
    color: #22d3ee;
    margin-bottom: 15px;
    text-shadow: 0 0 15px rgba(34, 211, 238, 0.6);
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;

    background: rgba(15, 23, 42, 0.8);
    border: 1px solid rgba(34, 211, 238, 0.2);
    color: white;
    outline: none;
}

input:focus {
    border: 1px solid #22d3ee;
    box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;

    background: linear-gradient(90deg, #22d3ee, #0ea5e9);
    color: black;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
}

.google {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<!-- 🔄 LOADING -->
<div id="loading">
    <h1>CYBER SHIELD</h1>
    <div class="loader"></div>
</div>

<!-- 🔐 LOGIN -->
<div class="card" id="loginCard">
    <h2>CYBER SHIELD</h2>

    <input type="email" id="email" placeholder="Enter email">
    <input type="password" id="password" placeholder="Enter password">

    <button onclick="login()">CONTINUE</button>
    <button onclick="signup()">SIGN UP</button>
    <button class="google" onclick="googleLogin()">Continue with Google</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB5X95YgL3uFwNb6S7vRbhUMrqpjPj9Udw",
  authDomain: "cyber-web-app.firebaseapp.com",
  projectId: "cyber-web-app",
  storageBucket: "cyber-web-app.appspot.com",
  messagingSenderId: "432294151782",
  appId: "1:432294151782:web:edcf1a74701eea04ae4fa7",
  measurementId: "G-4YXW9NXRFM"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* ✅ SAFE LOADING FIX */
window.onload = () => {
    setTimeout(() => {
        const loading = document.getElementById("loading");
        const card = document.getElementById("loginCard");

        if (loading) loading.style.display = "none";
        if (card) card.style.display = "block";
    }, 2000);
};

/* LOGIN */
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(() => {
        alert("Login successful ✅");
        window.location.href = "dashboard.html";
    })
    .catch(err => alert(err.message));
}

/* SIGNUP */
function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Signup successful ✅"))
    .catch(err => alert(err.message));
}

/* GOOGLE LOGIN */
function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .then(() => {
        alert("Google Login successful ✅");
        window.location.href = "dashboard.html";
    })
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
