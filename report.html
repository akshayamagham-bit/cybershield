<!DOCTYPE html>
<html>
<head>
  <title>Report Incident</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #7c2d12);
      color: white;
      margin: 0;
      padding: 30px;
    }

    h1 { text-align: center; }

    .container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .form-box {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(255,100,0,0.4);
    }

    label {
      display: block;
      margin-top: 15px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #0f172a;
      color: white;
    }

    textarea { height: 100px; }

    .upload {
      margin-top: 15px;
      padding: 20px;
      border: 2px dashed gray;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
    }

    .upload input { display: none; }

    .submit-btn {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg,#f97316,#ef4444);
      color: white;
      cursor: pointer;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,100,0,0.4);
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      color: white;
    }

    .call { background: green; }
    .visit { background: #2563eb; }
    .email { background: purple; }

    .important {
      background: #f97316;
      color: black;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

  </style>
</head>

<body>

<h1>⚠ REPORT INCIDENT</h1>

<div class="container">

  <!-- FORM -->
  <div class="form-box">

    <label>Incident Type</label>
    <select id="type">
      <option>Phishing</option>
      <option>Fraud</option>
      <option>Hacking</option>
      <option>Other</option>
    </select>

    <label>Description</label>
    <textarea id="desc" placeholder="Describe the issue..."></textarea>

    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com">

    <label>Phone</label>
    <input type="text" id="phone" placeholder="+91 XXXXXXXX">

    <!-- FILE -->
    <label>Attachments</label>
    <div class="upload" onclick="document.getElementById('file').click()">
      Click to upload evidence
      <input type="file" id="file">
    </div>

    <button class="submit-btn" onclick="submitReport()">Submit Report</button>

  </div>

  <!-- SIDE -->
  <div class="side">

    <div class="card">
      <h3>📞 Helpline</h3>
      <button class="btn call" onclick="callNumber()">Call 1930</button>
    </div>

    <div class="card">
      <h3>🌐 Cyber Crime Portal</h3>
      <button class="btn visit" onclick="visitWebsite()">Visit Website</button>
    </div>

    <div class="card">
      <h3>📧 Email Support</h3>
      <button class="btn email" onclick="sendEmail()">Send Email</button>
    </div>

    <div class="important">
      ⚠ In emergency call 100 or 112 immediately
    </div>

  </div>

</div>

<script>

// 📞 CALL
function callNumber() {
  window.location.href = "tel:1930";
}

// 🌐 WEBSITE
function visitWebsite() {
  window.open("https://cybercrime.gov.in", "_blank");
}

// 📧 EMAIL (FIXED ✅)
function sendEmail() {
  let type = document.getElementById("type").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let desc = document.getElementById("desc").value;

  let subject = encodeURIComponent("Cyber Crime Report - " + type);

  let body = encodeURIComponent(
    "Cyber Incident Report\n\n" +
    "Type: " + type + "\n" +
    "Email: " + email + "\n" +
    "Phone: " + phone + "\n\n" +
    "Description:\n" + desc
  );

  window.location.href =
    "mailto:complaints@cybercrime.gov.in?subject=" +
    subject +
    "&body=" +
    body;
}

// 📤 SUBMIT
function submitReport() {
  alert("Report submitted successfully ✅");
}

</script>

</body>
</html>
